paths:
  /auth/oidc/start:
    get:
      tags:
        - Auth
      summary: Start OIDC Authorization Code via BFF (Web Admin)
      description: Web Admin primary login (ADR-008 / ADR-FE-013). Browser navigates
        here (same-origin); BFF stores OIDC state, then 302-redirects to the IdP
        authorize endpoint. JavaScript never receives tokens. Query return_to
        must be a same-origin relative path.
      operationId: startOidcLogin
      x-permission: public
      x-idempotency: not-required
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/CorrelationId"
        - name: return_to
          in: query
          required: false
          description: Same-origin relative path after successful callback (default /).
          schema:
            type: string
            maxLength: 512
            pattern: ^/
        - name: tenant_hint
          in: query
          required: false
          description: Optional tenant code hint for multi-tenant IdP routing; never used
            for authorization.
          schema:
            type: string
            maxLength: 100
      responses:
        "302":
          description: Redirect to IdP authorize URL
          headers:
            Location:
              description: IdP authorize URL
              schema:
                type: string
                format: uri
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security: []
  /auth/oidc/callback:
    get:
      tags:
        - Auth
      summary: Complete OIDC Authorization Code via BFF (Web Admin)
      description: IdP redirects here with authorization code + state. BFF validates
        state, exchanges code, establishes server-side session, sets HttpOnly
        Secure SameSite session cookie and CSRF cookie, then 302-redirects to
        return_to. On MFA required, may redirect to /2fa with challenge context
        instead of completing session.
      operationId: completeOidcLogin
      x-permission: public
      x-idempotency: not-required
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/CorrelationId"
        - name: code
          in: query
          required: false
          schema:
            type: string
            maxLength: 2048
        - name: state
          in: query
          required: false
          schema:
            type: string
            maxLength: 512
        - name: error
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
        - name: error_description
          in: query
          required: false
          schema:
            type: string
            maxLength: 1000
      responses:
        "302":
          description: Redirect to app return_to (session cookies set) or /2fa / /login on
            failure
          headers:
            Location:
              schema:
                type: string
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security: []
  /auth/login:
    post:
      tags:
        - Auth
      summary: Local-credential login (DEPRECATED for Web Admin)
      description: DEPRECATED for Web Admin. Web Admin MUST use startOidcLogin /
        completeOidcLogin (GAP-009, ADR-008, ADR-FE-013). Retained only as a
        non-browser local-credential escape hatch if ever enabled. Windows
        desktop uses Authorization Code + PKCE (ADR-FE-014), not this endpoint.
      deprecated: true
      operationId: login
      x-permission: public
      x-idempotency: not-required
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Success
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
