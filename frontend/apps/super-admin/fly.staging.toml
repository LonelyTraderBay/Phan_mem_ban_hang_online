# Fly static Super Admin staging — deploy from frontend/ with:
#   fly deploy -c apps/super-admin/fly.staging.toml --dockerfile apps/super-admin/Dockerfile.staging

app = "ai-sales-ops-staging"
primary_region = "sin"

[build]
  dockerfile = "apps/super-admin/Dockerfile.staging"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
