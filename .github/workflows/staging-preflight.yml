# Staging pipeline (BE-FND-014) — workflow_dispatch only, no auto prod

# Gate: HO sets confirm_phase_a=PASS only after HO-STAGING-CHECKLIST mục 4 PASS.
# Requires GitHub Environment "staging" with secrets/vars (see BE-FND-014-staging-ci.md).

name: staging-preflight

on:
  workflow_dispatch:
    inputs:
      confirm_phase_a:
        description: "Type PASS only if BE-FND-015 Phase A already verified on managed staging"
        required: true
        default: "PENDING"
      run_migrate:
        description: "Run migrate.mjs against STAGING_DATABASE_URL"
        type: boolean
        default: true
      run_health:
        description: "GET STAGING_API_BASE_URL/health"
        type: boolean
        default: true
      run_fly_deploy:
        description: "Deploy Fly API if FLY_API_TOKEN is set"
        type: boolean
        default: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Require Phase A confirmation
        run: |
          if [ "${{ inputs.confirm_phase_a }}" != "PASS" ]; then
            echo "Blocked: set confirm_phase_a=PASS only after HO-STAGING-CHECKLIST mục 4 PASS."
            echo "See backend/docs/release/staging-cutover.md and BE-FND-015."
            exit 1
          fi
          echo "Phase A confirmation OK for this run."

  migrate:
    needs: gate
    if: ${{ inputs.run_migrate }}
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"
      - name: Enable corepack pnpm
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - name: Install backend deps (migrate needs pg)
        run: pnpm install --frozen-lockfile
      - name: Migrate staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing secrets.STAGING_DATABASE_URL on Environment staging"
            exit 1
          fi
          node tools/migrate.mjs

  health:
    needs: [gate, migrate]
    if: ${{ always() && inputs.run_health && needs.gate.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: GET /health
        env:
          STAGING_API_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
        run: |
          if [ -z "$STAGING_API_BASE_URL" ]; then
            echo "Missing secrets.STAGING_API_BASE_URL on Environment staging"
            exit 1
          fi
          url="${STAGING_API_BASE_URL%/}/health"
          echo "Checking $url"
          code=$(curl -sS -o /tmp/health.body -w "%{http_code}" "$url")
          echo "HTTP $code"
          head -c 500 /tmp/health.body || true
          test "$code" = "200"

  deploy:
    needs: [gate, health]
    if: ${{ inputs.run_fly_deploy }}
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy staging API to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "Skipping Fly deploy: secrets.FLY_API_TOKEN not set on Environment staging"
            exit 0
          fi
          flyctl deploy --remote-only -a phan-mem-ban-hang-online-api

  # Summarize migrate/health/deploy outcomes. See backend/docs/release/staging-fly-deploy.md
  deploy_note:
    needs: [gate, migrate, health, deploy]
    if: ${{ always() && needs.gate.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy status
        run: |
          echo "Migrate/health jobs finished."
          echo "Optional Fly deploy job: set workflow input run_fly_deploy=true."
          echo "Requires secrets.FLY_API_TOKEN on Environment staging (skips with exit 0 if missing)."
          echo "Target app: phan-mem-ban-hang-online-api"
          echo "Docs: backend/docs/release/BE-FND-014-staging-ci.md"
          echo "Fly runbook: backend/docs/release/staging-fly-deploy.md"
