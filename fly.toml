# Phan_mem_ban_hang_online — API (repo-root Fly Launch / Git deploy)
# App already exists. Prefer: cd backend && fly deploy
# Health: https://phan-mem-ban-hang-online-api.fly.dev/health

app = "phan-mem-ban-hang-online-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  SERVICE_NAME = "api"
  PORT = "3000"
  LOG_LEVEL = "info"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"
