# Fly.io staging API — app name fixed for Phase A2 scaffolding.
# Deploy from backend/: fly deploy
# Health: GET https://ai-sales-api-staging.fly.dev/health

app = "ai-sales-api-staging"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  SERVICE_NAME = "api"
  PORT = "3000"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"
