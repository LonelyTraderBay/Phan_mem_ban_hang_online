components:
  schemas:
    Actor:
      type: object
      additionalProperties: false
      required:
      - type
      properties:
        type:
          type: string
          enum:
          - user
          - service
          - ai
          - system
          - support
        id:
          type:
          - string
          - 'null'
    EventEnvelope:
      type: object
      additionalProperties: false
      required:
      - specversion
      - id
      - source
      - type
      - time
      - datacontenttype
      - tenantid
      - correlationid
      - data
      properties:
        specversion:
          type: string
          const: '1.0'
        id:
          type: string
          format: uuid
        source:
          type: string
        type:
          type: string
        subject:
          type:
          - string
          - 'null'
        time:
          type: string
          format: date-time
        datacontenttype:
          type: string
          const: application/json
        dataschema:
          type:
          - string
          - 'null'
        tenantid:
          type: string
          format: uuid
        correlationid:
          type: string
        causationid:
          type:
          - string
          - 'null'
        partitionkey:
          type:
          - string
          - 'null'
        actor:
          $ref: '#/components/schemas/Actor'
        data:
          type: object
          additionalProperties: true
    RealtimeNotification:
      type: object
      additionalProperties: false
      required:
      - schema_version
      - tenant_id
      - resource_id
      - resource_version
      - occurred_at
      properties:
        schema_version:
          type: integer
          minimum: 1
        tenant_id:
          type: string
          format: uuid
        resource_id:
          type: string
          format: uuid
        resource_version:
          type: integer
        occurred_at:
          type: string
          format: date-time
        summary:
          type: object
          additionalProperties: true
  messages:
    tenantActivated:
      name: tenantActivated
      title: com.aisales.tenant.activated.v1
      contentType: application/json
      headers:
        type: object
        properties:
          event-type:
            type: string
            const: com.aisales.tenant.activated.v1
          event-id:
            type: string
            format: uuid
      payload:
