asyncapi: 3.1.0
info:
  title: AI Sales Operating System Events
  version: 2.0.0
  description: Starter AsyncAPI contract for internal domain events and realtime notifications.
servers:
  redis:
    host: redis.internal:6379
    protocol: redis
    description: Logical transport; BullMQ queues/outbox publisher are implementation details.
  sse:
    host: api.example.com
    pathname: /api/v1/realtime/stream
    protocol: https
    description: Authenticated Server-Sent Events endpoint.
