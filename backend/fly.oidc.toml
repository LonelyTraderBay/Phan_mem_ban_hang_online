# Fly app: interim OIDC for Phan_mem_ban_hang_online (until Auth0)
# Deploy from backend/: fly deploy -c fly.oidc.toml

app = "phan-mem-ban-hang-online-oidc"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.oidc"

[env]
  PORT = "8080"
  MOCK_OIDC_PORT = "8080"
  MOCK_OIDC_EMAIL = "owner@staging.ai-sales.local"
  MOCK_OIDC_CLIENT_ID = "web-admin-staging"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"
