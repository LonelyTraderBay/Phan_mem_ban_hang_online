openapi: 3.1.1
info:
  title: AI Sales Operating System Backend API
  version: 2.0.0
  description: Contract starter generated from Backend Enterprise Implementation Blueprint v2.0. Each sprint MUST refine operation-specific schemas/examples before freeze.
servers:
  - url: https://api.example.com/api/v1
    description: Production
  - url: https://api.staging.example.com/api/v1
    description: Staging
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Tenant
  - name: Members
  - name: Roles
  - name: Sessions
  - name: Audit
  - name: Customers
  - name: Catalog
  - name: Imports
  - name: Inventory
  - name: Knowledge
  - name: Channels
  - name: Webhooks
  - name: Conversations
  - name: Realtime
  - name: AI
  - name: Orders
  - name: Payments
  - name: Shipments
  - name: Returns
  - name: Analytics
  - name: Billing
  - name: Operations
paths:
  /auth/oidc/start:
    get:
      tags:
        - Auth
      summary: Start OIDC Authorization Code via BFF (Web Admin)
      description: Web Admin primary login (ADR-008 / ADR-FE-013). Browser navigates here (same-origin); BFF stores OIDC state, then 302-redirects to the IdP authorize endpoint. JavaScript never receives tokens. Query return_to must be a same-origin relative path.
      operationId: startOidcLogin
      x-permission: public
      x-idempotency: not-required
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/CorrelationId"
        - name: return_to
          in: query
          required: false
          description: Same-origin relative path after successful callback (default /).
          schema:
            type: string
            maxLength: 512
            pattern: ^/
        - name: tenant_hint
          in: query
          required: false
          description: Optional tenant code hint for multi-tenant IdP routing; never used for authorization.
          schema:
            type: string
            maxLength: 100
      responses:
        "302":
          description: Redirect to IdP authorize URL
          headers:
            Location:
              description: IdP authorize URL
              schema:
                type: string
                format: uri
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security: []
  /auth/oidc/callback:
    get:
      tags:
        - Auth
      summary: Complete OIDC Authorization Code via BFF (Web Admin)
      description: IdP redirects here with authorization code + state. BFF validates state, exchanges code, establishes server-side session, sets HttpOnly Secure SameSite session cookie and CSRF cookie, then 302-redirects to return_to. On MFA required, may redirect to /2fa with challenge context instead of completing session.
      operationId: completeOidcLogin
      x-permission: public
      x-idempotency: not-required
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/CorrelationId"
        - name: code
          in: query
          required: false
          schema:
            type: string
            maxLength: 2048
        - name: state
          in: query
          required: false
          schema:
            type: string
            maxLength: 512
        - name: error
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
        - name: error_description
          in: query
          required: false
          schema:
            type: string
            maxLength: 1000
      responses:
        "302":
          description: Redirect to app return_to (session cookies set) or /2fa / /login on failure
          headers:
            Location:
              schema:
                type: string
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security: []
  /auth/login:
    post:
      tags:
        - Auth
      summary: Local-credential login (DEPRECATED for Web Admin)
      description: DEPRECATED for Web Admin. Web Admin MUST use startOidcLogin / completeOidcLogin (GAP-009, ADR-008, ADR-FE-013). Retained only as a non-browser local-credential escape hatch if ever enabled. Windows desktop uses Authorization Code + PKCE (ADR-FE-014), not this endpoint.
      deprecated: true
      operationId: login
      x-permission: public
      x-idempotency: not-required
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Success
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
  /auth/mfa/verify:
    post:
      tags:
        - Auth
      summary: Verify mfa
      operationId: verifyMfa
      x-permission: public
      x-idempotency: not-required
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Success
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyRequest"
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh cookie session (BFF)
      description: Rotates the server-side session/refresh family for cookie-authenticated clients. Request body is empty; session comes from HttpOnly cookie. Requires X-CSRF-Token. Web Admin never receives tokens in the JSON body.
      operationId: refreshSession
      x-permission: session
      x-idempotency: not-required
      x-csrf-protection: cookie-session-required
      parameters:
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: Success
          headers:
            X-Request-Id:
              $ref: "#/components/headers/XRequestId"
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyCommandRequest"
  /auth/logout:
    post:
      tags:
