components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        format: uuid
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: false
      description: Required for browser requests authenticated by the BFF session cookie. The value must match the non-HttpOnly csrf_token cookie (double-submit). Not required for OAuth/PKCE bearer clients. Missing or mismatched values return 403 CSRF_TOKEN_INVALID.
      schema:
        type: string
        minLength: 32
        maxLength: 256
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
      example: '"v3"'
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        maxLength: 2048
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
  headers:
    XRequestId:
      schema:
        type: string
      description: Server request ID
    XCorrelationId:
      schema:
        type: string
      description: Business correlation ID
    ETag:
      schema:
        type: string
      description: Resource version ETag
  schemas:
    Meta:
      type: object
      additionalProperties: false
      required:
        - request_id
      properties:
        request_id:
          type: string
        correlation_id:
          type:
            - string
            - "null"
    PageInfo:
      type: object
      additionalProperties: false
      required:
        - has_more
      properties:
        next_cursor:
          type:
            - string
            - "null"
        has_more:
          type: boolean
    FieldError:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        field:
          type:
            - string
            - "null"
        code:
          type: string
        message:
          type: string
        meta:
          type: object
          additionalProperties: true
    Problem:
      type: object
      additionalProperties: true
      required:
        - type
        - title
        - status
        - code
        - request_id
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
        code:
          type: string
        detail:
          type:
            - string
            - "null"
        instance:
          type:
            - string
            - "null"
        request_id:
          type: string
        correlation_id:
          type:
            - string
            - "null"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
    GenericResource:
      type: object
      additionalProperties: true
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      deprecated: true
      description: " DEPRECATED after W1 freeze — must not be referenced by implementable operations."
    GenericDataResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          $ref: "#/components/schemas/GenericResource"
        meta:
          $ref: "#/components/schemas/Meta"
      deprecated: true
      description: " DEPRECATED after W1 freeze — must not be referenced by implementable operations."
    GenericListResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - page_info
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GenericResource"
        page_info:
          $ref: "#/components/schemas/PageInfo"
        meta:
          $ref: "#/components/schemas/Meta"
      deprecated: true
      description: " DEPRECATED after W1 freeze — must not be referenced by implementable operations."
    GenericCommandRequest:
      type: object
      additionalProperties: true
      description: Starter placeholder. Replace with operation-specific schema before contract freeze. DEPRECATED after W1 freeze — must not be referenced by implementable operations.
      deprecated: true
    JobResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: object
          additionalProperties: false
          required:
            - job_id
            - status
          properties:
            job_id:
              type: string
              format: uuid
            status:
              type: string
              enum:
                - queued
                - running
                - completed
                - failed
                - cancelled
            status_url:
              type:
                - string
                - "null"
        meta:
          $ref: "#/components/schemas/Meta"
    MfaVerifyRequest:
      type: object
      additionalProperties: false
      required:
        - challenge_id
        - code
      properties:
        challenge_id:
          type: string
          format: uuid
        code:
          type: string
          pattern: ^[0-9]{6}$
          description: Single-use TOTP or approved recovery-code challenge response.
    EmptyCommandRequest:
      type: object
      additionalProperties: false
      description: Empty body for cookie-authenticated commands that take no fields.
      properties: {}
    EmptyOkResponse:
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: object
          additionalProperties: false
        meta:
          $ref: "#/components/schemas/Meta"
    SwitchTenantRequest:
      type: object
      additionalProperties: false
      required:
        - tenant_id
      properties:
        tenant_id:
          type: string
          format: uuid
    PasswordForgotRequest:
      type: object
      additionalProperties: false
      required:
        - email
      properties:
        email:
          type: string
          format: email
          maxLength: 320
    PasswordResetRequest:
      type: object
      additionalProperties: false
      required:
        - token
        - new_password
      properties:
        token:
          type: string
          minLength: 16
          maxLength: 256
        new_password:
          type: string
          minLength: 8
          maxLength: 256
    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 8
          maxLength: 256
        tenant_code:
          type:
            - string
            - "null"
          maxLength: 100
        device:
          type:
            - object
            - "null"
          additionalProperties: false
          properties:
            device_id:
              type: string
            platform:
              type: string
            app_version:
              type: string
    SessionBootstrapUser:
      type: object
      additionalProperties: false
      required:
        - id
        - display_name
        - locale
